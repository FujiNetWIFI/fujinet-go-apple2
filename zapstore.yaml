repository: https://github.com/FujiNetWIFI/fujinet-go-apple2
description: FujiNet Go Apple2 is a portable Apple ][ emulator for Android with built-in FujiNet support, bringing modern networking to classic computing. Run your favorite Apple II software while accessing network-hosted disk images, services, and multiplayer experiences just like real FujiNet hardware, but entirely in software. The AppleWin emulator and the FujiNet firmware run together in one app, joined over SmartPort-over-SLIP. Take your Apple II anywhere! No cables, no disks, no limits!
summary: FujiNet Go Apple2 brings the classic Apple ][ computing experience to Android with built-in FujiNet support
